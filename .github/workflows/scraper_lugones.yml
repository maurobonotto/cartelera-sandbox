name: Scraper Semanal Lugones

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (incl. puppeteer stealth)
        run: |
          cd backend
          npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer

      - name: Run Lugones scraper
        run: node backend/scraper_lugones.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática cartelera Lugones"
          file_pattern: "backend/peliculas_lugones.json"