name: Scraper Semanal Lugones

on:
  schedule:
    - cron: '0 0 * * 0'   # Todos los domingos a las 00:00 UTC
  workflow_dispatch:       # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write
  models: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - run: npm install
        working-directory: backend
      
      - name: Run Lugones scraper
        run: node scraper_lugones.js
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática cartelera Lugones"
          file_pattern: backend/peliculas_lugones.json