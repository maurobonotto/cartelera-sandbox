name: Scraper Semanal Lugones

on:
  schedule:
    - cron: '0 0 * * 0'      # Todos los domingos a las 00:00 UTC
  workflow_dispatch:          # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write             # Necesario para que el workflow pueda hacer commit del JSON generado

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias (axios, cheerio)
        run: npm install axios cheerio
        working-directory: backend

      - name: Ejecutar el scraper de Lugones
        run: node scraper_lugones.js
        working-directory: backend
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}

      - name: Commit y push del archivo JSON generado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática cartelera Lugones"
          file_pattern: "backend/peliculas_lugones.json"