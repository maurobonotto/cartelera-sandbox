name: Scraper Semanal Lugones

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium system browser
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install Node dependencies
        run: npm install
        working-directory: backend

      - name: Run Lugones scraper
        run: node scraper_lugones.js
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática cartelera Lugones"
          file_pattern: "backend/peliculas_lugones.json"