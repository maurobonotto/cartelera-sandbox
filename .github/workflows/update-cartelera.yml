name: Actualizar Cartelera Gaumont

on:
  schedule:
    # Ejecuta los jueves a las 4:00, 12:00 y 20:00 UTC (equivale a 1:00, 9:00 y 17:00 Argentina, ajusta si es necesario)
    - cron: '0 4,12,20 * * 4'
  # Permite ejecución manual desde la pestaña Actions
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: ./backend
        run: npm ci

      - name: 🕷️ Ejecutar scraper
        working-directory: ./backend
        # La API key se lee desde el entorno (opcional, si el scraper la usa)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scraper_gaumont.js

      - name: 🚀 Subir cambios al repositorio
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: actualizar cartelera [skip ci]"
          file_pattern: backend/peliculas.json backend/peliculas.backup.json