name: Actualizar Cartelera Gaumont

on:
  schedule:
    - cron: '0 4,12,20 * * 4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: ./backend
        run: npm ci

      - name: 🕷️ Ejecutar scraper
        working-directory: ./backend
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scraper_gaumont.js

      - name: 🚀 Subir cambios al repositorio
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: actualizar cartelera [skip ci]"
          file_pattern: backend/peliculas.json backend/peliculas.backup.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>