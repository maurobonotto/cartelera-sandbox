<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrenos de Cine CABA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div id="site-title" onclick="volverInicio()">
            Estrenos de Cine 
            <span class="site-subtitle">Horarios centralizados de cines de CABA</span>
        </div>
    </header>

    <div id="vista-catalogo">
        <section class="filters-section">
            <div class="filter-group">
                <label for="filtro-cine">Cine</label>
                <select id="filtro-cine" onchange="filtrarPeliculas()">
                    <option value="todos">Todos los cines</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filtro-dia">Día</label>
                <select id="filtro-dia" onchange="filtrarPeliculas()">
                    <option value="todos">Todos los días</option>
                </select>
            </div>
        </section>

        <section class="movies-section">
            <h2>Películas en Cartelera</h2>
            <div class="movies-mosaic" id="contenedor-peliculas">
                </div>
        </section>
    </div>

    <div id="vista-detalle" class="hidden">
        <section class="detail-filters-section">
            <div class="filter-group">
                <button onclick="volverInicio()" style="background: #242424; color: var(--text-bright); border: 1px solid var(--border-strong); padding: 6px 16px; border-radius: 3px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: 600;">
                    ← Volver a la cartelera
                </button>
            </div>
        </section>

        <section class="movie-presentation" id="contenedor-info-pelicula">
            </section>

        <section class="showtimes-section">
            <h3>Funciones disponibles</h3>
            <div id="showtimes-container">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
