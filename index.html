<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Sandbox - Horarios CABA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <!-- MENÚ HAMBURGUESA -->
        <div class="hamburger-menu">
            <button id="menu-toggle" class="menu-toggle" aria-label="Menú">☰</button>
            <nav id="menu-nav" class="menu-nav hidden">
                <ul>
                    <li><a href="#cartelera" class="menu-link">En Cartelera</a></li>
                    <li><a href="#proximos" class="menu-link">Próximos Estrenos</a></li>
                </ul>
            </nav>
        </div>

        <h1 id="site-title" style="cursor: pointer;">
            Cine Sandbox
            <span class="site-subtitle">Horarios centralizados de cines de CABA</span>
        </h1>
    </header>

    <main id="home-view">
        <section class="filters-section">
            <div class="filter-group">
                <label for="home-filter-ciudad">Ciudad</label>
                <select id="home-filter-ciudad">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="home-filter-cine">Cine</label>
                <select id="home-filter-cine">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="home-filter-dia">Día</label>
                <select id="home-filter-dia">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="home-filter-horario">Horario</label>
                <select id="home-filter-horario">
                    <option value="">Todos</option>
                </select>
            </div>
        </section>

        <section id="cartelera" class="movies-section">
            <h2>En Cartelera <span id="cartelera-counter" class="counter"></span></h2>
            <div id="cartelera-grid" class="movies-mosaic"></div>
        </section>

        <section id="proximos" class="movies-section">
            <h2>Próximos Estrenos <span id="proximos-counter" class="counter"></span></h2>
            <div id="proximos-grid" class="movies-mosaic"></div>
        </section>
    </main>

    <main id="detail-view" class="hidden">
        <section class="movie-presentation">
            <div class="poster-column">
                <img id="detail-poster" src="" alt="Póster de la película">
            </div>
            <div class="info-column">
                <h2 id="detail-titulo">Título de la Película</h2>
                <p><strong>Director:</strong> <span id="detail-director"></span></p>
                <p><strong>Duración:</strong> <span id="detail-duracion"></span> min</p>
                <p><strong>Sinopsis:</strong></p>
                <p id="detail-sinopsis" class="sinopsis-text"></p>

                <div id="trailer-container" class="trailer-container hidden">
                    <a id="trailer-link" href="#" target="_blank" rel="noopener noreferrer" class="trailer-btn">▶ Ver tráiler oficial</a>
                </div>
            </div>
        </section>

        <section class="detail-filters-section">
            <div class="filter-group">
                <label for="detail-filter-ciudad">Ciudad</label>
                <select id="detail-filter-ciudad">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="detail-filter-cine">Cine</label>
                <select id="detail-filter-cine">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="detail-filter-dia">Día</label>
                <select id="detail-filter-dia">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="detail-filter-horario">Horario</label>
                <select id="detail-filter-horario">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="detail-filter-idioma">Idioma</label>
                <select id="detail-filter-idioma">
                    <option value="">Todos</option>
                </select>
            </div>
        </section>

        <section class="showtimes-section">
            <h3>Funciones disponibles</h3>
            <div id="showtimes-container"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
